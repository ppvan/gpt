# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  BIN_DIR: bin
  BINS:
    - bpe
    - logic_gates
    - ndigits
    - avg
    - edit_distance
    - vocab
    - first_number
    - avg-lstm
    # - prime

tasks:
  default:
    cmds:
      - task: build

  build:
    desc: Build all executables
    cmds:
      - for: { var: BINS }
        task: build:one
        vars:
          NAME: "{{.ITEM}}"

  build:one:
    internal: true
    requires:
      vars: [NAME]
    cmds:
      - go build -trimpath -o {{.BIN_DIR}}/{{.NAME}}.exe ./cmd/{{.NAME}}
    sources:
      - cmd/{{.NAME}}/**/*.go
    generates:
      - "{{.BIN_DIR}}/{{.NAME}}.exe"

  build:bpe:
    cmds:
      - task: build:one
        vars:
          NAME: bpe

  build:first_number:
    cmds:
      - task: build:one
        vars:
          NAME: first_number

  build:logic_gates:
    cmds:
      - task: build:one
        vars:
          NAME: logic_gates

  build:ndigits:
    cmds:
      - task: build:one
        vars:
          NAME: ndigits

  build:avg-lstm:
    cmds:
      - task: build:one
        vars:
          NAME: avg-lstm

  run:
    desc: Run a command
    requires:
      vars: [NAME]
    cmds:
      - go run ./cmd/{{.NAME}}

  tidy:
    desc: Run go mod tidy
    cmds:
      - go mod tidy

  fmt:
    desc: Format Go source
    cmds:
      - gofmt -w .

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  clean:
    desc: Remove built binaries
    cmds:
      - rm -rf {{.BIN_DIR}}