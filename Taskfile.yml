# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

vars:
  GREETING: Hello, world!
  BIN_DIR: bin
  CLI_BINS: [logic_gates, prime]

tasks:
  default:
    desc: Print a greeting message
    cmds:
      - echo "{{.GREETING}}"
    silent: true

  build:
    desc: Build all binaries
    deps: [winres:ndigits]
    cmds:
      - for: { var: CLI_BINS }
        task: build:cli:one
        vars:
          NAME: '{{.ITEM}}'
      - task: build:gui:one
        vars:
          NAME: ndigits

  build:cli:one:
    internal: true
    requires:
      vars: [NAME]
    cmds:
      - go build -trimpath -o {{.BIN_DIR}}/{{.NAME}}.exe ./cmd/{{.NAME}}
    sources:
      - cmd/{{.NAME}}/**/*.go
    generates:
      - '{{.BIN_DIR}}/{{.NAME}}.exe'

  build:gui:one:
    internal: true
    requires:
      vars: [NAME]
    cmds:
      - go build -trimpath -ldflags "-s -w -H=windowsgui" -o {{.BIN_DIR}}/{{.NAME}}.exe ./cmd/{{.NAME}}
    sources:
      - cmd/{{.NAME}}/**/*.go
    generates:
      - '{{.BIN_DIR}}/{{.NAME}}.exe'

  build:logic_gates:
    desc: Build logic_gates
    cmds:
      - task: build:cli:one
        vars:
          NAME: logic_gates

  build:prime:
    desc: Build prime
    cmds:
      - task: build:cli:one
        vars:
          NAME: prime

  winres:ndigits:
    desc: Generate Windows resources (icon, manifest, version info) for ndigits
    dir: cmd/ndigits
    cmds:
      - go-winres make --product-version=git-tag
    sources:
      - winres/**/*
    generates:
      - rsrc_windows_amd64.syso
      - rsrc_windows_386.syso

  build:ndigits:
    desc: Build ndigits
    deps: [winres:ndigits]
    cmds:
      - task: build:gui:one
        vars:
          NAME: ndigits

  run:logic_gates:
    desc: Run logic_gates
    cmds:
      - go run ./cmd/logic_gates

  run:prime:
    desc: Run prime
    cmds:
      - go run ./cmd/prime

  tidy:
    desc: Run go mod tidy
    cmds:
      - go mod tidy

  fmt:
    desc: Format all Go source
    cmds:
      - gofmt -l -w .

  vet:
    desc: Run go vet across the module
    cmds:
      - go vet ./...

  clean:
    desc: Remove built binaries and generated Windows resource files
    cmds:
      - rm -rf {{.BIN_DIR}}
      - rm -f cmd/ndigits/rsrc_windows_amd64.syso cmd/ndigits/rsrc_windows_386.syso